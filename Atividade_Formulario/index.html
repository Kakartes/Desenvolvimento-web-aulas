<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <form action="/submit" method="Post">
        <h3>Cadastre-se
            e os apoie!
        </h3>

        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="nome completo…">
        </div>

        <div class="form-group">
            <label for="data_nascimento">Data de Nascimento:</label>
            <input type="date" id="data_nascimento" name="data_nascimento">
        </div>

        <div class="form-group">
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(99) 99999-9999">
        </div>

        <div class="form-group">
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Digite uma senha segura">
        </div>

        <div class="form-group">
            <label for="site">Website:</label>
            <input type="url" id="site" name="site" placeholder="https://example.com">
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
        </div>

        <div class="form-group">
            <label>Habilidades:</label>
            <label for="html">
                <input type="checkbox" id="html" name="habilidades" value="HTML">HTML
            </label>
            <label for="css">
                <input type="checkbox" id="css" name="habilidades" value="CSS">CSS
            </label>
            <label for="js">
                <input type="checkbox" id="js" name="habilidades" value="JS">JavaScript
            </label>
        </div>

        <div class="form-group">
            <label for="pais">País:</label>
            <select id="pais" name="pais">
                <option value="" disabled selected>Selecione um país</option>
                <option value="br">Brasil</option>
                <option value="pt">Portugal</option>
                <option value="es">Espanha</option>
                <option value="fr">França</option>
                <option value="us">Estados Unidos</option>
                <option value="ca">Canadá</option>
                <option value="ar">Argentina</option>
                <option value="mx">México</option>
                <option value="de">Alemanha</option>
                <option value="it">Itália</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comentarios">Comentários:</label><br>
            <div class="text-formatting">
                <button type="button" data-command="bold"><strong>B</strong></button>
                <button type="button" data-command="italic"><em>I</em></button>
                <button type="button" data-command="underline"><u>U</u></button>
            </div>
            <textarea id="comentarios" name="comentarios"></textarea>
        </div>

        <div class="form-group">
            <button type="submit">Enviar</button>
        </div>
        <p class="disclaimer">Esse cadastro não é real</p>
    </form>
    <script>
        const textarea = document.getElementById('comentarios');
        const buttons = document.querySelectorAll('.text-formatting button');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const command = button.dataset.command;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const selectedText = textarea.value.slice(start, end);
                const wrappers = {
                    bold: ['**', '**'],
                    italic: ['*', '*'],
                    underline: ['__', '__']
                };
                const [openTag, closeTag] = wrappers[command] || ['', ''];

                if (start === end) {
                    textarea.setRangeText(openTag + closeTag, start, end, 'end');
                    textarea.selectionStart = textarea.selectionEnd = start + openTag.length;
                } else {
                    textarea.setRangeText(openTag + selectedText + closeTag, start, end, 'select');
                    textarea.selectionStart = start;
                    textarea.selectionEnd = start + openTag.length + selectedText.length + closeTag.length;
                }
                textarea.focus();
            });
        });

        // Redirecionamento ao enviar o formulário
        const form = document.querySelector('form');
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            window.location.href = 'https://snowleopard.org/';
        });
    </script>

</body>

</html>
