<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>



    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f0f0;
        }

        .semaforo {
            width: 220px;
            height: 520px;
            background-color: #111;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px 0;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.35);
        }

        .caixa-lanterna {
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lanterna {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.4);
        }

        .lanterna.vermelha {
            background-color: red;
        }

        .lanterna.laranja {
            background-color: orange;
        }

        .lanterna.verde {
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="semaforo">
        <div class="caixa-lanterna">
            <div class="lanterna vermelha"></div>
        </div>
        <div class="caixa-lanterna">
            <div class="lanterna laranja"></div>
        </div>
        <div class="caixa-lanterna">
            <div class="lanterna verde"></div>
        </div>
    </div>
</body>
</html>
